<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Josue — Estás invitado!</title>
<meta property="og:title" content="Josue, estás invitado a mi cumple!">
<meta property="og:description" content="Noche de Pizzas y Brindis — 15 de Mayo, 21:00hs — Tristán Narvaja 3053">
<meta property="og:image" content="../img/hero-banner.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Cormorant+Garamond:wght@600&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;background:#0d0a1a;background:radial-gradient(ellipse at 50% 30%,rgba(155,89,182,.15),transparent 70%),radial-gradient(ellipse at 80% 80%,rgba(232,71,122,.12),transparent),#0d0a1a;color:#fef9ef;padding:2rem;overflow:hidden}
.card{max-width:480px;width:100%;background:linear-gradient(145deg,rgba(30,22,50,.95),rgba(20,15,35,.98));border:1px solid rgba(232,197,71,.25);border-radius:20px;padding:3rem 2.5rem;text-align:center;position:relative;overflow:hidden;animation:appear .8s ease-out}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,#e8c547,#e8477a,#c8a2e8)}
.emoji{font-size:4rem;margin-bottom:1rem;display:block;animation:bounce 2s ease-in-out infinite}
.name{font-family:'Cormorant Garamond',serif;font-size:2.5rem;font-weight:600;background:linear-gradient(135deg,#f5e6a3,#ff6b9d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
.tag{font-family:'Caveat',cursive;font-size:1.2rem;color:#ff6b9d;margin-bottom:1.5rem}
.msg{font-family:'Caveat',cursive;font-size:1.3rem;line-height:1.6;opacity:.85;margin-bottom:2rem}
.details{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem}
.det{background:rgba(255,255,255,.04);border:1px solid rgba(232,197,71,.15);border-radius:10px;padding:1rem}
.det .di{font-size:1.5rem}.det .dl{font-family:'Caveat',cursive;font-size:.9rem;color:#c8a2e8}
.det .dv{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#f5e6a3;font-weight:600}
.ft{font-family:'Caveat',cursive;font-size:1.1rem;color:#c8a2e8;opacity:.6;margin-top:1rem}
@keyframes appear{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
</style></head><body>
<div class="card">
<span class="emoji">🤙</span>
<div class="name">Josue</div>
<div class="tag">Un gran amigo</div>
<div class="msg">Josue, gracias por la buena onda, las juntadas y los buenos momentos. ¡Te espero en mi cumple para pasarla bien!</div>
<div class="details">
<div class="det"><div class="di">📅</div><div class="dl">Fecha</div><div class="dv">15 de Mayo</div></div>
<div class="det"><div class="di">⏰</div><div class="dl">Hora</div><div class="dv">21:00 hs</div></div>
<div class="det"><div class="di">📍</div><div class="dl">Lugar</div><div class="dv">Tristán Narvaja 3053</div></div>
<div class="det"><div class="di">🍕</div><div class="dl">Menú</div><div class="dv">Pizzas y Brindis</div></div>
</div>
<div class="ft">Hecho con amor — ¡Te espero!</div>
</div>
</body></html>
